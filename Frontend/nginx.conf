server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy todas las llamadas /api/ al backend
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
        proxy_redirect     off;
    }

    # SPA: archivos estáticos existentes se sirven directo;
    # cualquier ruta no encontrada sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # nginx rechaza POST/PUT/DELETE a archivos estáticos con 405.
    # Esta directiva lo convierte en 200 y sirve la SPA para que
    # el router del cliente resuelva la ruta.
    error_page 405 =200 /index.html;
}
